<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Finn's Ascent Clone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }

    #hud {
      position: fixed;
      top: 16px; left: 16px;
      color: #fff;
      font-family: sans-serif;
      pointer-events: none;
      user-select: none;
    }
    #score-display { font-size: 22px; font-weight: bold; }
    #height-display { font-size: 14px; opacity: 0.8; margin-top: 4px; }

    #charge-wrap {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center;
      gap: 6px; pointer-events: none;
    }
    #charge-label { color: #fff; font-size: 13px; font-family: sans-serif; }
    #charge-bg {
      width: 200px; height: 14px;
      background: rgba(255,255,255,0.2);
      border-radius: 7px; overflow: hidden;
    }
    #charge-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      border-radius: 7px;
      transition: width 0.05s linear;
    }

    #start-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,20,60,0.85);
      color: #fff; font-family: sans-serif;
    }
    #start-screen h1 { font-size: 42px; margin-bottom: 12px; }
    #start-screen p  { font-size: 16px; opacity: 0.75; margin-bottom: 8px; }
    #start-screen button {
      margin-top: 20px; padding: 12px 32px;
      font-size: 18px; cursor: pointer;
      border: 2px solid #fff; background: transparent; color: #fff;
      border-radius: 8px; transition: background 0.2s;
    }
    #start-screen button:hover { background: rgba(255,255,255,0.15); }
  </style>
</head>
<body>

  <div id="hud">
    <div id="score-display">🍩 0</div>
    <div id="height-display">Cao: 0m</div>
  </div>

  <div id="charge-wrap">
    <div id="charge-label">BOOST</div>
    <div id="charge-bg"><div id="charge-bar"></div></div>
  </div>

  <div id="start-screen">
    <h1>🐟 Finn's Ascent</h1>
    <p>Di chuyển: WASD hoặc ← → ↑ ↓</p>
    <button id="btn-start">Bắt đầu</button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
